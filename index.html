<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Random Hamsters</title>

<style>
    body {
        font-family: Arial, sans-serif;
        text-align: center;
        background: #111;
        color: white;
        margin: 0;
        padding: 20px;
    }

    h1 {
        margin-bottom: 20px;
    }

    .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 15px;
        max-width: 900px;
        margin: auto;
    }

    .grid img {
        width: 100%;
        height: 250px;
        object-fit: cover;
        border-radius: 12px;
        box-shadow: 0 0 10px rgba(0,0,0,0.6);
    }

    button {
        margin-top: 20px;
        padding: 12px 25px;
        font-size: 18px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        background: #ffb347;
        color: white;
        transition: 0.2s;
    }

    button:hover {
        background: #ff9800;
        transform: scale(1.05);
    }

    footer {
        margin-top: 50px;
        font-size: 32px;
        font-weight: bold;
    }
</style>
</head>

<body>

<h1>Random Hamsters 🐹</h1>

<div class="grid" id="hamsterGrid"></div>

<button onclick="loadHamsters()">Get New Images</button>

<footer>made by Luni</footer>

<script>
async function loadHamsters() {
    const grid = document.getElementById("hamsterGrid");
    grid.innerHTML = "";

    for (let i = 0; i < 4; i++) {
        // Random hamster search from Unsplash
        const img = document.createElement("img");

        img.src = `https://source.unsplash.com/600x400/?hamster&sig=${Math.random()}`;

        grid.appendChild(img);
    }
}

loadHamsters();
</script>

</body>
</html>
