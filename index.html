<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Random Hamsters</title>

<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: #111;
    color: white;
    margin: 0;
    padding: 20px;
}

h1 {
    margin-bottom: 20px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 15px;
    max-width: 900px;
    margin: auto;
}

.grid img {
    width: 100%;
    height: 250px;
    object-fit: cover;
    border-radius: 12px;
    box-shadow: 0 0 10px rgba(0,0,0,0.6);
    background: #222;
}

button {
    margin-top: 20px;
    padding: 12px 25px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    background: #ffb347;
    color: white;
    transition: 0.2s;
}

button:hover {
    background: #ff9800;
    transform: scale(1.05);
}

footer {
    margin-top: 50px;
    font-size: 32px;
    font-weight: bold;
}
</style>
</head>

<body>

<h1>Random Hamsters 🐹</h1>

<div class="grid" id="hamsterGrid"></div>

<button onclick="loadHamsters()">Get New Images</button>

<footer>made by Luni</footer>

<script>
const API_KEY = "55957313-3f7b188cbd76ec04730d89a17";

const hamsterQueries = [
    "hamster",
    "cute hamster",
    "baby hamster",
    "hamster eating",
    "hamster funny",
    "hamster close up"
];

const grid = document.getElementById("hamsterGrid");

function getRandom(arr) {
    return arr[Math.floor(Math.random() * arr.length)];
}

async function loadHamsters() {
    grid.innerHTML = ""; // clear old images

    const query = getRandom(hamsterQueries);
    const page = Math.floor(Math.random() * 50) + 1;

    const res = await fetch(
        `https://pixabay.com/api/?key=${API_KEY}&q=${encodeURIComponent(query)}&image_type=photo&per_page=12&page=${page}`
    );

    const data = await res.json();

    data.hits.forEach(item => {
        const img = document.createElement("img");
        img.src = item.webformatURL;
        grid.appendChild(img);
    });
}

// initial load
async function loadHamsters() {
    grid.innerHTML = "";

    // keep ONE strong query for consistency
    const query = "hamster";

    // use a slowly changing page instead of pure randomness
    const page = Math.floor(Math.random() * 10) + 1;

    const res = await fetch(
        `https://pixabay.com/api/?key=${API_KEY}&q=${encodeURIComponent(query)}&image_type=photo&per_page=12&page=${page}&safesearch=true`
    );

    const data = await res.json();

    // shuffle locally instead of changing API behavior too much
    const shuffled = data.hits.sort(() => Math.random() - 0.5);

    shuffled.forEach(item => {
        const img = document.createElement("img");
        img.src = item.webformatURL;
        grid.appendChild(img);
    });
}
</script>

</body>
</html>
