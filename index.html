<script>
const API_KEY = "55957313-3f7b188cbd76ec04730d89a17";
const grid = document.getElementById("hamsterGrid");

const hamsterQueries = [
    "hamster",
    "cute hamster",
    "baby hamster",
    "hamster eating",
    "hamster close up",
    "hamster funny"
];

function getRandom(arr) {
    return arr[Math.floor(Math.random() * arr.length)];
}

async function loadHamsters() {
    grid.innerHTML = ""; // clear old images

    const query = getRandom(hamsterQueries);
    const page = Math.floor(Math.random() * 50) + 1; // random page = new results

    const res = await fetch(
        `https://pixabay.com/api/?key=${API_KEY}&q=${encodeURIComponent(query)}&image_type=photo&per_page=12&page=${page}`
    );

    const data = await res.json();

    data.hits.forEach(item => {
        const img = document.createElement("img");
        img.src = item.webformatURL;
        grid.appendChild(img);
    });
}
</script>
