<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Random Hamsters</title>

<style>
    body {
        font-family: Arial, sans-serif;
        text-align: center;
        background: #111;
        color: white;
        margin: 0;
        padding: 20px;
    }

    h1 {
        margin-bottom: 20px;
    }

    .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 15px;
        max-width: 900px;
        margin: auto;
    }

    .grid img {
        width: 100%;
        height: 250px;
        object-fit: cover;
        border-radius: 12px;
        box-shadow: 0 0 10px rgba(0,0,0,0.6);
        background: #222;
    }

    button {
        margin-top: 20px;
        padding: 12px 25px;
        font-size: 18px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        background: #ffb347;
        color: white;
        transition: 0.2s;
    }

    button:hover {
        background: #ff9800;
        transform: scale(1.05);
    }

    footer {
        margin-top: 50px;
        font-size: 32px;
        font-weight: bold;
    }
</style>
</head>

<body>

<h1>Random Hamsters 🐹</h1>

<div class="grid" id="hamsterGrid"></div>

<button onclick="loadHamsters()">Get New Images</button>

<footer>made by Luni</footer>

<script>
// Generate 500 unique hamster image URLs
const hamsterImages = [];

for (let i = 1; i <= 500; i++) {
    hamsterImages.push(
        `https://loremflickr.com/600/400/hamster?lock=${i}`
    );
}

function loadHamsters() {
    const grid = document.getElementById("hamsterGrid");

    // clear old images
    grid.innerHTML = "";

    // shuffle images randomly
    const shuffled = [...hamsterImages]
        .sort(() => Math.random() - 0.5)
        .slice(0, 4);

    // display 4 random hamster images
    shuffled.forEach(url => {
        const img = document.createElement("img");

        img.src = url;

        img.loading = "lazy";

        // hide broken images
        img.onerror = () => {
            img.style.display = "none";
        };

        grid.appendChild(img);
    });
}

loadHamsters();
</script>

</body>
</html>
